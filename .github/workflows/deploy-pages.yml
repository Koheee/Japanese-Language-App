name: Test and deploy Nihongo Path

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate project
        run: |
          pnpm typecheck
          pnpm test

      - name: Determine GitHub Pages base path
        id: base
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [[ "$repo_name" == *.github.io ]]; then
            echo "url=" >> "$GITHUB_OUTPUT"
          else
            echo "url=/$repo_name" >> "$GITHUB_OUTPUT"
          fi

      - name: Export installable web app
        env:
          EXPO_BASE_URL: ${{ steps.base.outputs.url }}
        run: pnpm export:web

      - name: Verify public artifact boundary
        run: pnpm audit:public -- --tracked --dist dist

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload web build
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
